<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OniCord Admin | Ban Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0b0e14;
            --sidebar-bg: #151921;
            --card-bg: #151921;
            --accent: #7289da;
            --danger: #ff4757;
            --input-bg: #1e252f;
            --border: #2f3542;
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-body); color: var(--text); display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar { width: 320px; background: var(--sidebar-bg); padding: 30px 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 15px; }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--accent); margin-bottom: 20px; letter-spacing: 1px; }

        label { font-size: 0.8rem; color: #a4b0be; display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: white; margin-bottom: 10px; }
        
        .clip-row { display: flex; gap: 5px; margin-bottom: 5px; }
        .btn-small { background: var(--border); border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.7rem; }
        
        .btn-execute { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; }

        /* Main Content */
        .main { flex-grow: 1; padding: 40px; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); padding: 25px; border-radius: 12px; border-bottom: 3px solid var(--accent); position: relative; }
        .stat-card.active-card { border-bottom-color: var(--danger); }
        .stat-card span { color: #a4b0be; font-size: 0.9rem; }
        .stat-card strong { display: block; font-size: 2rem; margin-top: 5px; }

        /* Table */
        .table-container { background: var(--card-bg); border-radius: 15px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1e252f; padding: 15px; text-align: left; color: #a4b0be; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 20px 15px; border-bottom: 1px solid var(--border); vertical-align: top; }
        
        .badge-time { background: rgba(255, 71, 87, 0.1); color: var(--danger); padding: 5px 10px; border-radius: 6px; font-size: 0.8rem; }
        .clip-link { color: #ff9f43; text-decoration: none; font-size: 0.85rem; display: block; margin-bottom: 5px; }
        .note-text { font-size: 0.8rem; color: #a4b0be; font-style: italic; max-width: 200px; }
        .btn-delete { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .btn-delete:hover { background: var(--danger); color: white; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">ONICORD ADMIN</div>
        
        <div>
            <label>Hráč</label>
            <input type="text" id="pName" placeholder="Nick hráče">
        </div>

        <div>
            <label>Důvod</label>
            <input type="text" id="pReason" placeholder="Cheating, Griefing...">
        </div>

        <div>
            <label>Vlastní délka banu (Dny)</label>
            <input type="number" id="pDays" value="7">
            <small style="color: #636e72; font-size: 0.7rem;">0 = Permanentní</small>
        </div>

        <div>
            <label>Důkazy (Medal / Odkazy)</label>
            <div id="clipList">
                <input type="text" class="clip-url" placeholder="https://medal.tv/...">
            </div>
            <button class="btn-small" onclick="addClipField()">+ DALŠÍ ODKAZ</button>
        </div>

        <div>
            <label>Poznámka</label>
            <textarea id="pNote" rows="2" placeholder="Interní poznámka..."></textarea>
        </div>

        <button class="btn-execute" id="saveBtn">VYKONAT BAN</button>
    </aside>

    <main class="main">
        <div class="stats">
            <div class="stat-card">
                <span>Celkem banů</span>
                <strong id="totalBans">0</strong>
            </div>
            <div class="stat-card active-card">
                <span>Aktivní tresty</span>
                <strong id="activeBans">0</strong>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Hráč</th>
                        <th>Důvod</th>
                        <th>Důkazy</th>
                        <th>Poznámka</th>
                        <th>Vyprší za</th>
                        <th>Akce</th>
                    </tr>
                </thead>
                <tbody id="banTableBody"></tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCZdEqkvS_tcKTXH2crNABumcgrAGB6wVA",
            authDomain: "onicord-94d3c.firebaseapp.com",
            projectId: "onicord-94d3c",
            storageBucket: "onicord-94d3c.firebasestorage.app",
            messagingSenderId: "653786531722",
            appId: "1:653786531722:web:c2e9f3bc6cc2d6332d6a73"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.addClipField = () => {
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'clip-url';
            input.placeholder = 'Další odkaz...';
            document.getElementById('clipList').appendChild(input);
        }

        document.getElementById('saveBtn').onclick = async () => {
            const name = document.getElementById('pName').value;
            const reason = document.getElementById('pReason').value;
            const days = parseInt(document.getElementById('pDays').value);
            const note = document.getElementById('pNote').value;
            const clips = Array.from(document.querySelectorAll('.clip-url')).map(i => i.value).filter(v => v !== "");

            if(!name || !reason) return alert("Vyplň nick a důvod!");

            const expires = days === 0 ? 0 : Date.now() + (days * 24 * 60 * 60 * 1000);

            await addDoc(collection(db, "bans"), {
                player: name,
                reason: reason,
                clips: clips,
                note: note,
                expires: expires,
                created: Date.now()
            });

            location.reload();
        };

        async function load() {
            const q = query(collection(db, "bans"), orderBy("created", "desc"));
            const snap = await getDocs(q);
            const tbody = document.getElementById('banTableBody');
            const now = Date.now();
            let total = 0, active = 0;

            snap.forEach(sDoc => {
                const d = sDoc.data();
                total++;
                const isPerm = d.expires === 0;
                const isExpired = !isPerm && now > d.expires;
                if(!isExpired) active++;

                const timeText = isPerm ? 'Permanentní' : (isExpired ? 'Vypršelo' : Math.ceil((d.expires - now) / (1000*60*60*24)) + ' dní');
                const clipsHtml = d.clips.map((c, i) => `<a href="${c}" target="_blank" class="clip-link">🎬 Clip #${i+1}</a>`).join('');

                tbody.innerHTML += `
                    <tr>
                        <td><strong>${d.player}</strong></td>
                        <td>${d.reason}</td>
                        <td>${clipsHtml || '-'}</td>
                        <td class="note-text">${d.note || '-'}</td>
                        <td><span class="badge-time">${timeText}</span></td>
                        <td><button class="btn-delete" onclick="del('${sDoc.id}')">Smazat</button></td>
                    </tr>
                `;
            });
            document.getElementById('totalBans').innerText = total;
            document.getElementById('activeBans').innerText = active;
        }

        window.del = async (id) => {
            if(confirm("Odstranit tento ban?")) {
                await deleteDoc(doc(db, "bans", id));
                location.reload();
            }
        }
        load();
    </script>
</body>
</html>
